name: 'Build Release Artifacts'
description: 'Build Debian and web deployable release artifacts via tools.release.'

inputs:
  output_dir:
    description: Relative output directory where build artifacts are written.
    required: false
    default: release
  python_executable:
    description: Python interpreter used for release tooling commands.
    required: false
    default: python3

outputs:
  artifact_dir:
    description: Absolute path to the generated release artifact directory.
    value: ${{ steps.package.outputs.artifact_dir }}

runs:
  using: "composite"
  steps:
    - name: Release preflight (runner + env assumptions)
      shell: bash
      run: |
        set -euo pipefail
        PYTHON_BIN="${{ inputs.python_executable }}"
        echo "[preflight] validating runner + release environment assumptions"
        echo "[preflight] PYTHON_BIN=${PYTHON_BIN}"
        if [ ! -x "$PYTHON_BIN" ] && ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
          echo "::error::Configured python executable is not available: ${PYTHON_BIN}"
          exit 1
        fi
        "$PYTHON_BIN" --version
        echo "[preflight] RELEASE_AI_MODE=${RELEASE_AI_MODE:-<unset>}"
        echo "[preflight] RELEASE_AI_PROFILE_OPENAI=${RELEASE_AI_PROFILE_OPENAI:-<unset>}"
        echo "[preflight] RELEASE_LOCAL_LLM_ENABLED=${RELEASE_LOCAL_LLM_ENABLED:-<unset>}"
        echo "[preflight] RELEASE_LOCAL_LLM_PROFILE=${RELEASE_LOCAL_LLM_PROFILE:-<unset>}"
        echo "[preflight] RELEASE_LOCAL_LLM_BASE_URL=${RELEASE_LOCAL_LLM_BASE_URL:-<unset>}"
        echo "[preflight] RELEASE_DEBIAN_DISTRIBUTION=${RELEASE_DEBIAN_DISTRIBUTION:-<unset>}"
        echo "[preflight] RELEASE_DEBIAN_URGENCY=${RELEASE_DEBIAN_URGENCY:-<unset>}"
        if [ -n "${OPENAI_API_KEY:-}" ]; then
          echo "[preflight] OPENAI_API_KEY configured: yes"
        else
          echo "[preflight] OPENAI_API_KEY configured: no"
        fi
        if [ -n "${RELEASE_LOCAL_LLM_API_KEY:-}" ]; then
          echo "[preflight] RELEASE_LOCAL_LLM_API_KEY configured: yes"
        else
          echo "[preflight] RELEASE_LOCAL_LLM_API_KEY configured: no"
        fi

        case "${RELEASE_AI_MODE:-auto}" in
          auto|openai-only|local-only|disabled) ;;
          *)
            echo "::error::Release preflight failed: RELEASE_AI_MODE must be one of auto|openai-only|local-only|disabled."
            exit 1
            ;;
        esac

        if [ "${RELEASE_AI_MODE:-auto}" = "local-only" ]; then
          if [ "${RELEASE_LOCAL_LLM_ENABLED:-false}" != "true" ]; then
            echo "::error::Release preflight failed: RELEASE_AI_MODE=local-only requires RELEASE_LOCAL_LLM_ENABLED=true."
            exit 1
          fi
          if [ -z "${RELEASE_LOCAL_LLM_PROFILE:-}" ]; then
            echo "::error::Release preflight failed: RELEASE_AI_MODE=local-only requires RELEASE_LOCAL_LLM_PROFILE."
            exit 1
          fi
        fi

        debian_token_regex='^[A-Za-z0-9][A-Za-z0-9+.-]*$'
        if [ -n "${RELEASE_DEBIAN_DISTRIBUTION:-}" ] && ! [[ "${RELEASE_DEBIAN_DISTRIBUTION}" =~ $debian_token_regex ]]; then
          echo "::error::Release preflight failed: RELEASE_DEBIAN_DISTRIBUTION must be a Debian token (example: unstable)."
          exit 1
        fi
        if [ -n "${RELEASE_DEBIAN_URGENCY:-}" ] && ! [[ "${RELEASE_DEBIAN_URGENCY}" =~ $debian_token_regex ]]; then
          echo "::error::Release preflight failed: RELEASE_DEBIAN_URGENCY must be a Debian token (example: medium)."
          exit 1
        fi

        if [ ! -f VERSION ]; then
          echo "::error::Release preflight failed: VERSION is missing in workspace."
          exit 1
        fi
        if [ ! -f debian/changelog ]; then
          echo "::error::Release preflight failed: debian/changelog is missing."
          exit 1
        fi
        if [ ! -f web/package.json ]; then
          echo "::error::Release preflight failed: web/package.json is missing."
          exit 1
        fi

        command -v pnpm >/dev/null 2>&1 || { echo "::error::pnpm is not available on runner PATH."; exit 1; }
        command -v dpkg-buildpackage >/dev/null 2>&1 || { echo "::error::dpkg-buildpackage is not available on runner PATH."; exit 1; }
        command -v dpkg-deb >/dev/null 2>&1 || { echo "::error::dpkg-deb is not available on runner PATH."; exit 1; }
        echo "[preflight] runner checks passed"

    - name: Resolve release changelog (AI or manual fallback)
      shell: bash
      run: |
        set -euo pipefail
        PYTHON_BIN="${{ inputs.python_executable }}"
        scratch_dir=".changelog_scratch"
        artifact_dir="${{ inputs.output_dir }}"
        if [ -z "$artifact_dir" ] || [ "$artifact_dir" = "/" ] || [ "$artifact_dir" = "." ]; then
          echo "::error::Unsafe or empty output_dir for package action changelog stage: '$artifact_dir'"
          exit 1
        fi
        echo "[changelog] clearing volatile changelog scratch + staged changelog outputs"
        rm -rf "$scratch_dir" "$artifact_dir"
        mkdir -p "$artifact_dir"
        selection_output="${{ inputs.output_dir }}/changelog.selection.json"
        echo "[changelog] starting changelog generation/validation"
        mode="${RELEASE_AI_MODE:-auto}"
        openai_profile="${RELEASE_AI_PROFILE_OPENAI:-openai-balanced}"
        local_profile="${RELEASE_LOCAL_LLM_PROFILE:-}"
        local_base_url="${RELEASE_LOCAL_LLM_BASE_URL:-}"
        common_args=(
          --output "${{ inputs.output_dir }}/changelog.release.md"
          --raw-output "${{ inputs.output_dir }}/changelog.raw.md"
          --payload-output "${{ inputs.output_dir }}/changelog.payload.json"
          --release-notes-output "${{ inputs.output_dir }}/release_notes.md"
          --selection-output "${selection_output}"
        )
        case "$mode" in
          openai-only)
            echo "[changelog] command path: changelog ai-release (explicit OpenAI profile)"
            echo "[changelog] ai_profile=${openai_profile}"
            if ! "$PYTHON_BIN" -m tools.release changelog ai-release \
              --ai-profile "${openai_profile}" \
              "${common_args[@]}"; then
              echo "::error::AI release path failed in openai-only mode."
              exit 1
            fi
            ;;
          local-only)
            if [ -z "$local_profile" ]; then
              echo "::error::RELEASE_AI_MODE=local-only requires RELEASE_LOCAL_LLM_PROFILE."
              exit 1
            fi
            echo "[changelog] command path: changelog ai-release (explicit local profile)"
            echo "[changelog] ai_profile=${local_profile}"
            if [ -n "$local_base_url" ]; then
              echo "[changelog] local base_url override=${local_base_url}"
            fi
            local_args=(
              --ai-profile "${local_profile}"
              --provider openai-compatible
            )
            if [ -n "$local_base_url" ]; then
              local_args+=(--base-url "$local_base_url")
            fi
            if ! "$PYTHON_BIN" -m tools.release changelog ai-release \
              "${local_args[@]}" \
              "${common_args[@]}"; then
              echo "::error::AI release path failed in local-only mode."
              exit 1
            fi
            ;;
          auto|disabled)
            echo "[changelog] command path: changelog release (auto/disabled orchestrator)"
            echo "[changelog] openai_profile=${openai_profile}"
            if ! "$PYTHON_BIN" -m tools.release changelog release \
              "${common_args[@]}"; then
              echo "::error::Changelog stage failed. See logs above for path selection/fallback/stale-check diagnostics."
              exit 1
            fi
            ;;
          *)
            echo "::error::Unsupported RELEASE_AI_MODE for changelog stage: ${mode}"
            exit 1
            ;;
        esac
        if [ ! -f "${selection_output}" ]; then
          echo "::error::Missing changelog selection metadata output: ${selection_output}"
          exit 1
        fi
        echo "[changelog] selection metadata: ${selection_output}"
        echo "[changelog] completed successfully"

    - name: Build Debian + web release artifacts
      id: build
      shell: bash
      run: |
        set -euo pipefail
        PYTHON_BIN="${{ inputs.python_executable }}"
        echo "[package] starting Debian + web artifact build"
        if ! "$PYTHON_BIN" -m tools.release build-deb --output-dir "${{ inputs.output_dir }}"; then
          echo "::error::Packaging stage failed (Debian build, web build, or artifact staging)."
          exit 1
        fi
        echo "[package] build completed"

    - name: Validate release artifact contract
      shell: bash
      run: |
        set -euo pipefail
        PYTHON_BIN="${{ inputs.python_executable }}"
        echo "[validate] validating staged release artifact contract"
        if ! "$PYTHON_BIN" -m tools.release validate-release-artifacts --output-dir "${{ inputs.output_dir }}"; then
          echo "::error::Release artifact validation failed. Missing/invalid outputs were reported above."
          exit 1
        fi
        echo "[validate] staged artifact contract passed"

    - name: Expose artifact directory output
      id: package
      shell: bash
      run: |
        set -euo pipefail
        artifact_dir="${{ github.workspace }}/${{ inputs.output_dir }}"
        if [ ! -d "$artifact_dir" ]; then
          echo "::error::Expected artifact directory does not exist: $artifact_dir"
          exit 1
        fi
        echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
